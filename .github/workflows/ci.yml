name: CI

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.env.example'
      - '.gitignore'
      - '.dockerignore'
      - 'terraform/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.env.example'
      - '.gitignore'
      - '.dockerignore'
      - 'terraform/**'

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Backend: lint + unit tests (no live DB or OpenAI calls)
  # ──────────────────────────────────────────────────────────────────────────
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: medical_rag_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/medical_rag_test
      OPENAI_API_KEY: sk-test-placeholder   # mocked in tests — no real calls made
      TAVILY_API_KEY: ""
      API_KEY: ""
      ALLOWED_ORIGINS: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short

  # ──────────────────────────────────────────────────────────────────────────
  # Frontend: install + build (validates JS bundle compiles cleanly)
  # ──────────────────────────────────────────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build React app
        env:
          REACT_APP_API_URL: http://localhost:8000
          CI: "false"   # prevent treating warnings as errors in CRA
        run: npm run build

  # ──────────────────────────────────────────────────────────────────────────
  # Docker: build both images to verify Dockerfiles are valid
  # ──────────────────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: Dockerfile
          push: false
          tags: medical-rag-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: Dockerfile.frontend
          push: false
          tags: medical-rag-frontend:ci
          build-args: |
            REACT_APP_API_URL=http://localhost:8000
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────────────────────
  # Deploy: push to ECR + update ECS task (main branch only)
  # Requires secrets: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_REGION,
  #                   ECR_REGISTRY, ECR_BACKEND_REPO, ECR_FRONTEND_REPO,
  #                   ECS_CLUSTER, ECS_SERVICE_BACKEND, ECS_SERVICE_FRONTEND
  # ──────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to AWS ECS
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: Dockerfile
          push: true
          tags: ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_BACKEND_REPO }}:${{ github.sha }},${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_BACKEND_REPO }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: Dockerfile.frontend
          push: true
          tags: ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_FRONTEND_REPO }}:${{ github.sha }},${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_FRONTEND_REPO }}:latest
          build-args: |
            REACT_APP_API_URL=https://${{ secrets.CLOUDFRONT_DOMAIN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Force ECS service redeployment (backend)
        run: |
          aws ecs update-service \
            --cluster  "${{ secrets.ECS_CLUSTER }}" \
            --service  "${{ secrets.ECS_SERVICE_BACKEND }}" \
            --force-new-deployment

      - name: Force ECS service redeployment (frontend — if containerised)
        run: |
          aws ecs update-service \
            --cluster  "${{ secrets.ECS_CLUSTER }}" \
            --service  "${{ secrets.ECS_SERVICE_FRONTEND }}" \
            --force-new-deployment
        continue-on-error: true   # frontend may be served from S3/CloudFront instead
